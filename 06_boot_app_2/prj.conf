CONFIG_BOOTLOADER_MCUBOOT=y

#CONFIG_MCUBOOT_GENERATE_UNSIGNED_IMAGE=y
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="/home/mcb/mcuboot-signing-key.pem"

# Flash access
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# DFU image manager — provides boot_write_img_confirmed()
CONFIG_IMG_MANAGER=y

# MCUmgr core + CBOR + framing dependencies
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_BASE64=y
CONFIG_MCUMGR=y

# Image management (upload/list/confirm) and OS management (reset) command groups
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y

# UART transport for SMP frames
CONFIG_UART_MCUMGR=y
CONFIG_MCUMGR_TRANSPORT_UART=y

# MCUmgr command handlers need more stack than the blinky defaults
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2176

CONFIG_UART_INTERRUPT_DRIVEN=y
